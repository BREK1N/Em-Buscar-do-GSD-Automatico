{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso negado — Portal GSD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent:       #3b82f6;
            --danger:       #ef4444;
            --danger-dim:   rgba(239,68,68,0.10);
            --bg-page:      #f0f4f8;
            --bg-card:      #ffffff;
            --bg-sidebar:   #0f172a;
            --border:       rgba(0,0,0,0.08);
            --border-strong:rgba(0,0,0,0.14);
            --text-primary: #0f172a;
            --text-secondary:#64748b;
            --shadow-card:  0 4px 24px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.06);
            --font-display: 'Rajdhani', system-ui, sans-serif;
            --font-body:    'Inter', system-ui, sans-serif;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font-body);
            background: var(--bg-page);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .ph-header {
            background: var(--bg-sidebar);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 32px;
        }
        .ph-brand {
            display: flex; align-items: center; gap: 12px;
            text-decoration: none;
        }
        .ph-mark {
            width: 32px; height: 32px; border-radius: 8px;
            background: var(--accent);
            display: flex; align-items: center; justify-content: center;
            color: #fff;
        }
        .ph-mark svg { width: 18px; height: 18px; }
        .ph-word {
            font-family: var(--font-display); font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.06em;
            color: #fff; font-size: 17px;
        }

        .ph-page {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
        }

        .error-card {
            width: 100%;
            max-width: 420px;
            background: var(--bg-card);
            border: 1px solid var(--border-strong);
            border-radius: 18px;
            box-shadow: var(--shadow-card);
            padding: 44px 36px;
            text-align: center;
        }

        .error-icon {
            width: 72px; height: 72px;
            border-radius: 50%;
            background: var(--danger-dim);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 24px;
        }
        .error-icon svg { width: 36px; height: 36px; color: var(--danger); }

        .error-code {
            font-family: var(--font-display);
            font-size: 13px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.12em;
            color: var(--danger);
            margin-bottom: 8px;
        }

        .error-title {
            font-family: var(--font-display);
            font-size: 26px; font-weight: 700;
            letter-spacing: 0.03em;
            color: var(--text-primary);
            margin-bottom: 12px;
        }

        .error-message {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 11px 24px;
            font-family: var(--font-body);
            font-size: 14px; font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.15s;
        }
        .btn-back:hover { opacity: 0.88; }
        .btn-back svg { width: 16px; height: 16px; }
    </style>
</head>
<body>
    <header class="ph-header">
        <a class="ph-brand" href="/">
            <div class="ph-mark">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z" />
                </svg>
            </div>
            <span class="ph-word">Portal GSD</span>
        </a>
    </header>

    <main class="ph-page">
        <div class="error-card">
            <div class="error-icon">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
                </svg>
            </div>

            <p class="error-code">Erro 403</p>
            <h1 class="error-title">Acesso negado</h1>
            <p class="error-message">
                Você não tem permissão para aceder a esta página.<br>
                Se acredita que isso é um erro, contacte o administrador.
            </p>

            <a class="btn-back" href="{% url 'login:login' %}">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 15L3 9m0 0l6-6M3 9h12a6 6 0 010 12h-3" />
                </svg>
                Voltar ao Login
            </a>
        </div>
    </main>
</body>
</html>
