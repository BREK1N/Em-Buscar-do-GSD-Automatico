{% extends 'Secao_pessoal/base.html' %}

{% block title %}Prestação de Serviço de Militar{% endblock %}

{% block extra_head %}
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<style>
    .select2-container .select2-selection--single { height: 38px; border: 1px solid var(--border-color); background-color: var(--bg-main); border-radius: 6px; }
    .select2-container--default .select2-selection--single .select2-selection__rendered { line-height: 38px; color: var(--text-primary); }
    .select2-container--default .select2-selection--single .select2-selection__arrow { height: 36px; }
    .select2-dropdown { background-color: var(--bg-main); border: 1px solid var(--border-color); color: var(--text-primary); }
    .select2-search input { background-color: var(--bg-content); color: var(--text-primary); border: 1px solid var(--border-color); }
    .select2-container--default .select2-results__option--highlighted[aria-selected] { background-color: var(--accent-color); color: #fff; }
</style>
{% endblock %}

{% block content %}
<div class="content-column">
    <div class="table-header">
        <h1>Prestação de Serviço de Militar</h1>
    </div>

    <form method="post" class="model-form">
        {% csrf_token %}
        <div class="form-grid">
            <p>
                <label for="militar_psv">Militar que Prestará o Serviço:</label>
                <select name="militar_psv" id="militar_psv" class="form-select" required>
                    <option value="">--- Selecione o militar ---</option>
                    {% for militar in militares %}
                        <option value="{{ militar.id }}">{{ militar.posto }} {{ militar.nome_guerra }} ({{ militar.nome_completo }})</option>
                    {% endfor %}
                </select>
            </p>
            <p>
                <label for="unidade">Unidade de Prestação de Serviço (OM):</label>
                <input type="text" name="unidade" id="unidade" placeholder="Ex: BASC, PAMA-GL" required>
            </p>
            <p>
                <label for="sigad">SIGAD:</label>
                <input type="text" name="sigad" id="sigad" placeholder="Número/identificação do SIGAD">
            </p>
            <p>
                <label for="data_inicio">Data de Início (Apresentação):</label>
                <input type="date" name="data_inicio" id="data_inicio">
            </p>
            <p>
                <label for="data_vencimento">Data de Vencimento:</label>
                <input type="date" name="data_vencimento" id="data_vencimento">
            </p>
            <p>
                <label for="portaria">Portaria:</label>
                <input type="text" name="portaria" id="portaria" placeholder="Ex: PORT. Nº 123/GR1">
            </p>
            <p>
                <label for="data_portaria">Data da Portaria:</label>
                <input type="date" name="data_portaria" id="data_portaria">
            </p>
            <p>
                <label for="boletim">Boletim:</label>
                <input type="text" name="boletim" id="boletim" placeholder="Ex: 29 DE 12/02/2026">
            </p>
            <p>
                <label for="data_boletim">Data do Boletim:</label>
                <input type="date" name="data_boletim" id="data_boletim">
            </p>
        </div>
        <div class="form-actions">
            <a href="{% url 'Secao_pessoal:prestacao_servico' %}" class="btn btn-secondary">Cancelar</a>
            <button type="submit" class="btn btn-primary">Registrar Prestação de Serviço</button>
        </div>
    </form>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script>
    $(document).ready(function() {
        $('#militar_psv').select2({ placeholder: "--- Selecione o militar ---", width: '100%' });
    });
</script>
{% endblock %}
