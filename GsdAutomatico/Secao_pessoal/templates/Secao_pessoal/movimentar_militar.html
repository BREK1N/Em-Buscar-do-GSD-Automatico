{% extends 'Secao_pessoal/base.html' %}

{% block title %}Movimentação de Militar - Seção de Pessoal{% endblock %}

{% block extra_head %}
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<style>
    .select2-container .select2-selection--single {
        height: 38px;
        border: 1px solid var(--border-color);
        background-color: var(--bg-main);
        border-radius: 6px;
    }
    .select2-container--default .select2-selection--single .select2-selection__rendered {
        line-height: 38px;
        color: var(--text-primary);
    }
    .select2-container--default .select2-selection--single .select2-selection__arrow {
        height: 36px;
    }
    .select2-dropdown {
        background-color: var(--bg-main);
        border: 1px solid var(--border-color);
        color: var(--text-primary);
    }
    .select2-search input {
        background-color: var(--bg-content);
        color: var(--text-primary);
        border: 1px solid var(--border-color);
    }
    .select2-container--default .select2-results__option--highlighted[aria-selected] {
        background-color: var(--accent-color);
        color: #fff;
    }
</style>
{% endblock %}

{% block content %}
<div class="content-column">
    <div class="table-header">
        <h1>Movimentação de Militar</h1>
    </div>

    <form method="post" class="model-form">
        {% csrf_token %}
        <div class="form-grid">
            <p>
                <label for="militar_movimentacao">Militar a ser Movimentado:</label>
                <select name="militar_movimentacao" id="militar_movimentacao" class="form-select" required>
                    <option value="">--- Selecione o militar ---</option>
                    {% for militar in militares %}
                        <option value="{{ militar.id }}">{{ militar.posto }} {{ militar.nome_guerra }} ({{ militar.nome_completo }})</option>
                    {% endfor %}
                </select>
            </p>
            <p>
                <label for="data_movimentacao">Data da Movimentação:</label>
                <input type="date" name="data_movimentacao" id="data_movimentacao" required>
            </p>
            <p>
                <label for="om_destino">OM de Destino:</label>
                <input type="text" name="om_destino" id="om_destino" placeholder="Ex: BASC">
            </p>
            <p>
                <label for="sigad_movimentacao">SIGAD:</label>
                <input type="text" name="sigad_movimentacao" id="sigad_movimentacao" placeholder="Ex: 84431">
            </p>
            <p>
                <label for="boletim_movimentacao">Boletim (BCA/Bol. INT):</label>
                <input type="text" name="boletim_movimentacao" id="boletim_movimentacao" placeholder="Ex: 29 DE 12/02/2026">
            </p>
            <p>
                <label for="observacao">Observação:</label>
                <textarea name="observacao" id="observacao" rows="4" placeholder="Observações adicionais sobre a movimentação."></textarea>
            </p>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Registrar Movimentação</button>
        </div>
    </form>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script>
    $(document).ready(function() {
        $('#militar_movimentacao').select2({
            placeholder: "--- Selecione o militar ---",
            width: '100%'
        });
    });
</script>
{% endblock %}
