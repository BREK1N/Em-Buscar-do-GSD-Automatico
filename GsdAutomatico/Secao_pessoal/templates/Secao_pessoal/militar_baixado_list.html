{% extends 'Secao_pessoal/base.html' %}

{% block title %}Efetivo Baixado{% endblock %}

{% block extra_head %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    /* Estilos para o modal de motivo da baixa se adaptar ao tema */
    .modal-content {
        background-color: var(--bg-content);
        color: var(--text-primary);
        border: 1px solid var(--border-color);
    }
    .modal-header, .modal-footer {
        border-color: var(--border-color);
    }
    /* Ajusta a cor do botão 'X' de fechar para o tema escuro */
    body.dark-theme .btn-close {
        filter: invert(1) grayscale(100%) brightness(200%);
    }
</style>
{% endblock %}

{% block content %}
<div class="table-header">
    <h1>Efetivo Desligado (Inativo)</h1>
    <div class="filter-bar">
        <div class="search-group">
            <form method="get" id="search-form" onsubmit="return false;">
                <input type="text" name="q" id="search-input" placeholder="Pesquisar por nome, posto, OM..." value="{{ request.GET.q }}">
                <button type="button" class="search-btn" aria-label="Pesquisar">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" /></svg>
                </button>
            </form>
        </div>
    </div>
</div>

<!-- Container para a tabela e paginação que será atualizado via AJAX -->
<div id="militar-list-container">
    {% include 'Secao_pessoal/militar_list_partial.html' %}
</div>
{% endblock %}

{% block extra_js %}
<!-- Bootstrap JS para o Modal -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const searchInput = document.getElementById('search-input');
    const container = document.getElementById('militar-list-container');
    let searchTimeout;

    searchInput.addEventListener('input', function() {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
            const query = searchInput.value;
            const url = `?q=${encodeURIComponent(query)}`;
            history.pushState(null, '', url);
            fetch(url, { headers: { 'X-Requested-With': 'XMLHttpRequest' } })
            .then(response => response.text())
            .then(html => { container.innerHTML = html; })
            .catch(error => console.error('Erro ao realizar a pesquisa:', error));
        }, 300);
    });
});
document.getElementById('search-form').addEventListener('submit', function(e) {
    e.preventDefault();
});
</script>
{% endblock %}
